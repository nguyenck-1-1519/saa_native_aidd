# Static analysis configuration for the SAA 2025 Flutter app.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "lib/core/l10n/app_localizations*.dart" # generated by flutter gen-l10n
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    invalid_annotation_target: ignore

linter:
  rules:
    prefer_relative_imports: true
    prefer_single_quotes: true
    require_trailing_commas: true
