name: saa_2025
description: "SAA 2025 — Sun* Annual Awards mobile app (Flutter, Clean Architecture)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.2

  # Backend / Auth
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.2

  # Config & storage
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # i18n
  intl: ^0.20.2

  # SVG rendering (Google icon from design)
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat.ttf
